base_config:
  - configs/acoustic.yaml

dictionaries:
  zh: dictionaries/opencpop-extension.txt
  # ja: dictionaries/dictionary-ja.txt
extra_phonemes: []
merged_phoneme_groups: []

datasets:
  - raw_data_dir: data/your_dataset/raw
    speaker: singer_name
    spk_id: 0
    language: zh
    test_prefixes:
      - validation_wav_1
      - validation_wav_2
      - validation_wav_3
      - validation_wav_4

binary_data_dir: data/your_dataset/binary
binarization_args:
  num_workers: 0

# Required for f0, optional denoise, and ContentVec unit extraction.
pe: parselmouth
pe_ckpt: checkpoints/rmvpe/model.pt
hnsep: vr
hnsep_ckpt: checkpoints/vr/model.pt
ddsp_svc_path: ../DDSP-SVC
contentvec_args:
  encoder: contentvec768l12tta2x
  encoder_sample_rate: 16000
  encoder_hop_size: 160
  encoder_out_channels: 768
  encoder_ckpt: checkpoints/contentvec/checkpoint_best_legacy_500.pt

use_lang_id: false
num_lang: 1
use_spk_id: false
num_spk: 1

# Experimental controls. Leave these disabled unless the acoustic frontend is
# trained with matching variance/key/speed inputs.
use_energy_embed: false
use_breathiness_embed: false
use_voicing_embed: false
use_tension_embed: false
use_key_shift_embed: false
use_speed_embed: false

# Aux-only unit frontend is the recommended default for DDSP-SVS.
unit_frontend_infer_aux: true
shallow_diffusion_args:
  train_aux_decoder: true
  train_diffusion: false
  val_gt_start: false
  aux_decoder_arch: convnext
  aux_decoder_args:
    num_channels: 384
    num_layers: 4
    kernel_size: 7
    dropout_rate: 0.1
  aux_decoder_grad: 0.1

optimizer_args:
  optimizer_cls: torch.optim.AdamW
  lr: 0.0004
  beta1: 0.9
  beta2: 0.98
  weight_decay: 0
lr_scheduler_args:
  scheduler_cls: torch.optim.lr_scheduler.StepLR
  step_size: 8000
  gamma: 0.8

max_batch_frames: 24000
max_batch_size: 12
max_updates: 96000

val_with_vocoder: false
val_check_interval: 1000
num_valid_plots: 0
num_ckpt_keep: 30
permanent_ckpt_start: 20000
permanent_ckpt_interval: 10000

pl_trainer_devices: auto
pl_trainer_precision: 32-true
